name: Deploy to Vercel

on:
  push:
    branches:
      - main

jobs:
  deploy-app:
    name: Deploy App
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Vercel CLI
        run: npm install -g vercel

      - name: Pull Vercel environment
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: team_0DugkSAlcnTIv8de5V4pYdzG
          VERCEL_PROJECT_ID: prj_DQpYckAAw47Hzp9yp59hhHnQNk0j

      - name: Build App
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: team_0DugkSAlcnTIv8de5V4pYdzG
          VERCEL_PROJECT_ID: prj_DQpYckAAw47Hzp9yp59hhHnQNk0j

      - name: Deploy App to Vercel
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: team_0DugkSAlcnTIv8de5V4pYdzG
          VERCEL_PROJECT_ID: prj_DQpYckAAw47Hzp9yp59hhHnQNk0j

  deploy-storybook:
    name: Deploy Storybook
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Storybook
        run: npm run build-storybook

      - name: Install Vercel CLI
        run: npm install -g vercel

      - name: Pull Vercel environment (Storybook)
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: team_0DugkSAlcnTIv8de5V4pYdzG
          VERCEL_PROJECT_ID: prj_EkYOmcaOOI7ANjGCeQQkTNcQlRk0

      - name: Deploy Storybook to Vercel
        run: vercel deploy storybook-static --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: team_0DugkSAlcnTIv8de5V4pYdzG
          VERCEL_PROJECT_ID: prj_EkYOmcaOOI7ANjGCeQQkTNcQlRk0
